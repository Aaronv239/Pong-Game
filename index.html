<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laser Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    h1 {
      font-size: 0.85rem;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: #ffffff33;
      margin-bottom: 14px;
    }

    #game-wrapper {
      position: relative;
      display: inline-block;
    }

    #canvas {
      display: block;
      border: 1px solid #ffffff12;
      border-radius: 4px;
    }

    #restart-btn {
      display: none;
      position: absolute;
      left: 50%;
      top: 63%;
      transform: translateX(-50%);
      padding: 10px 36px;
      font: bold 13px 'Courier New', monospace;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      background: transparent;
      color: #fff;
      border: 1.5px solid #ffffff66;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #restart-btn:hover {
      background: #ffffff18;
      border-color: #fff;
      box-shadow: 0 0 22px #ffffff55;
    }
    #restart-btn:active { background: #ffffff30; }

    #controls {
      margin-top: 14px;
      font-size: 0.62rem;
      color: #ffffff2a;
      letter-spacing: 0.12em;
      text-align: center;
      line-height: 2;
    }
  </style>
</head>
<body>
  <h1>Laser Pong</h1>
  <div id="game-wrapper">
    <canvas id="canvas" width="800" height="500"></canvas>
    <button id="restart-btn">&#9654; Play Again</button>
  </div>
  <div id="controls">
    P1: W / S &nbsp;—&nbsp; Left paddle &nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp; P2: UP / DOWN &nbsp;—&nbsp; Right paddle &nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp; SPACE &nbsp;—&nbsp; Pause
  </div>

  <script>
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const restartBtn = document.getElementById('restart-btn');
    const W = canvas.width, H = canvas.height;

    // ─── Config ───────────────────────────────────────────────
    const PADDLE_W       = 10;
    const BASE_H         = 90;
    const PADDLE_SPEED   = 6;
    const BALL_R         = 6;
    const WINNING_SCORE  = 7;
    const TRAIL_LEN      = 32;
    const SPAWN_INTERVAL = 7000;

    const LEFT_COLOR  = '#00ffff';
    const RIGHT_COLOR = '#ff00bb';

    // ─── State ────────────────────────────────────────────────
    const state = { paused: false, started: false, over: false, flash: 0 };
    let shake = 0;

    const leftPaddle  = { x: 30,                y: 0, h: BASE_H, score: 0, up: false, down: false, fx: {}, hitFlash: 0 };
    const rightPaddle = { x: W - 30 - PADDLE_W, y: 0, h: BASE_H, score: 0, up: false, down: false, fx: {}, hitFlash: 0 };
    const ball = { x: 0, y: 0, vx: 0, vy: 0, hue: 0, trail: [], lastSide: 'left', fx: {} };

    let particles    = [];
    let powerups     = [];
    let spawnTimer   = SPAWN_INTERVAL * 0.55;
    let lastTime     = 0;

    // ─── Power-up definitions ─────────────────────────────────
    const PU = [
      { id: 'speed',  icon: '⚡', color: '#ffdd00', glow: '#ff8800', dur: 5000 },
      { id: 'slow',   icon: '❄',  color: '#44ddff', glow: '#0066ff', dur: 6000 },
      { id: 'grow',   icon: '▲',  color: '#00ff88', glow: '#00cc44', dur: 7000 },
      { id: 'shrink', icon: '▼',  color: '#ff4455', glow: '#cc0022', dur: 5000 },
      { id: 'laser',  icon: '✦',  color: '#dd44ff', glow: '#8800ff', dur: 6000 },
    ];

    // ─── Particles ────────────────────────────────────────────
    function burst(x, y, color, count, minSpd, maxSpd, gravity = 0.12) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd   = minSpd + Math.random() * (maxSpd - minSpd);
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          r:  1.5 + Math.random() * 2.5,
          life: 1,
          decay: 0.022 + Math.random() * 0.022,
          color,
          gravity,
        });
      }
    }

    function burstArc(x, y, color, count, minSpd, maxSpd, arcDir) {
      // Arc of particles in one direction (for wall hits)
      for (let i = 0; i < count; i++) {
        const angle = arcDir + (Math.random() - 0.5) * Math.PI * 0.9;
        const spd   = minSpd + Math.random() * (maxSpd - minSpd);
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          r:  1 + Math.random() * 2,
          life: 1,
          decay: 0.03 + Math.random() * 0.03,
          color,
          gravity: 0.06,
        });
      }
    }

    // ─── Game reset helpers ───────────────────────────────────
    function spawnPowerup() {
      const def = PU[Math.floor(Math.random() * PU.length)];
      powerups.push({ ...def, x: W / 2 + (Math.random() - 0.5) * 320, y: 60 + Math.random() * (H - 120), r: 21, age: 0, life: 9000 });
    }

    function resetBall(serveLeft) {
      ball.x = W / 2; ball.y = H / 2;
      ball.trail = []; ball.fx = {};
      const angle = (Math.random() * 40 - 20) * (Math.PI / 180);
      const spd = 5;
      ball.vx = (serveLeft ? -1 : 1) * spd * Math.cos(angle);
      ball.vy = spd * Math.sin(angle);
    }

    function resetGame() {
      for (const p of [leftPaddle, rightPaddle]) {
        p.y = H / 2 - BASE_H / 2; p.h = BASE_H; p.score = 0; p.fx = {}; p.hitFlash = 0;
      }
      particles = []; powerups = [];
      spawnTimer = SPAWN_INTERVAL * 0.55;
      shake = 0;
      state.over = false; state.started = true; state.paused = false; state.flash = 0;
      restartBtn.style.display = 'none';
      resetBall(Math.random() < 0.5);
    }

    restartBtn.addEventListener('click', resetGame);

    // ─── Input ────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      switch (e.code) {
        case 'KeyW':      leftPaddle.up    = true; break;
        case 'KeyS':      leftPaddle.down  = true; break;
        case 'ArrowUp':   rightPaddle.up   = true; e.preventDefault(); break;
        case 'ArrowDown': rightPaddle.down = true; e.preventDefault(); break;
        case 'Space':
          if (!state.over && state.started) state.paused = !state.paused;
          if (!state.started) resetGame();
          e.preventDefault(); break;
        case 'Enter':
          if (state.over || !state.started) resetGame(); break;
      }
    });
    document.addEventListener('keyup', e => {
      switch (e.code) {
        case 'KeyW':      leftPaddle.up    = false; break;
        case 'KeyS':      leftPaddle.down  = false; break;
        case 'ArrowUp':   rightPaddle.up   = false; break;
        case 'ArrowDown': rightPaddle.down = false; break;
      }
    });

    // ─── Power-up apply ───────────────────────────────────────
    function applyPowerup(def, now) {
      const attacker = ball.lastSide === 'left' ? leftPaddle : rightPaddle;
      const defender = ball.lastSide === 'left' ? rightPaddle : leftPaddle;
      switch (def.id) {
        case 'speed':  ball.fx.speed      = now + def.dur; break;
        case 'slow':   ball.fx.slow       = now + def.dur; break;
        case 'grow':   attacker.fx.grow   = now + def.dur; break;
        case 'shrink': defender.fx.shrink = now + def.dur; break;
        case 'laser':  ball.fx.laser      = now + def.dur; break;
      }
      burst(ball.x, ball.y, def.color, 20, 2, 6);
      state.flash = 10;
    }

    // ─── Tick effects ─────────────────────────────────────────
    function tickFx(now) {
      for (const k of Object.keys(ball.fx)) if (ball.fx[k] < now) delete ball.fx[k];
      for (const paddle of [leftPaddle, rightPaddle]) {
        for (const k of Object.keys(paddle.fx)) if (paddle.fx[k] < now) delete paddle.fx[k];
        paddle.h = paddle.fx.grow ? BASE_H * 1.75 : paddle.fx.shrink ? BASE_H * 0.45 : BASE_H;
        if (paddle.hitFlash > 0) paddle.hitFlash--;
      }
    }

    function clamp(paddle) {
      paddle.y = Math.max(0, Math.min(H - paddle.h, paddle.y));
    }

    function hits(paddle) {
      return (
        ball.x - BALL_R < paddle.x + PADDLE_W &&
        ball.x + BALL_R > paddle.x &&
        ball.y + BALL_R > paddle.y &&
        ball.y - BALL_R < paddle.y + paddle.h
      );
    }

    // ─── Update ───────────────────────────────────────────────
    function update(dt, now) {
      if (!state.started || state.paused || state.over) return;
      dt = Math.min(dt, 50);

      tickFx(now);

      // Decay shake
      if (shake > 0) shake = Math.max(0, shake - 0.6);

      // Particles
      particles.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.97;
        p.life -= p.decay;
      });
      particles = particles.filter(p => p.life > 0);

      // Power-up spawn/expire
      spawnTimer += dt;
      if (spawnTimer >= SPAWN_INTERVAL && powerups.length < 3) { spawnPowerup(); spawnTimer = 0; }
      powerups = powerups.filter(p => { p.age += dt; return p.age < p.life; });

      // Paddles
      if (leftPaddle.up)    leftPaddle.y  -= PADDLE_SPEED;
      if (leftPaddle.down)  leftPaddle.y  += PADDLE_SPEED;
      if (rightPaddle.up)   rightPaddle.y -= PADDLE_SPEED;
      if (rightPaddle.down) rightPaddle.y += PADDLE_SPEED;
      clamp(leftPaddle); clamp(rightPaddle);

      // Ball trail
      ball.trail.push({ x: ball.x, y: ball.y, hue: ball.hue });
      if (ball.trail.length > TRAIL_LEN) ball.trail.shift();

      // Move ball
      const mult = ball.fx.speed ? 1.65 : ball.fx.slow ? 0.5 : 1;
      ball.x += ball.vx * mult;
      ball.y += ball.vy * mult;
      ball.hue = (ball.hue + 2.5) % 360;

      // Wall bounce with particles + shake
      if (ball.y - BALL_R <= 0) {
        ball.y = BALL_R;
        ball.vy = Math.abs(ball.vy);
        shake = 3;
        burstArc(ball.x, 0, `hsl(${ball.hue},100%,70%)`, 10, 1.5, 4, Math.PI * 0.5);
      }
      if (ball.y + BALL_R >= H) {
        ball.y = H - BALL_R;
        ball.vy = -Math.abs(ball.vy);
        shake = 3;
        burstArc(ball.x, H, `hsl(${ball.hue},100%,70%)`, 10, 1.5, 4, -Math.PI * 0.5);
      }

      // Paddle bounce with particles + shake
      if (ball.vx < 0 && hits(leftPaddle)) {
        ball.x = leftPaddle.x + PADDLE_W + BALL_R;
        const t = (ball.y - (leftPaddle.y + leftPaddle.h / 2)) / (leftPaddle.h / 2);
        const a = t * 60 * Math.PI / 180;
        const s = Math.min(Math.hypot(ball.vx, ball.vy) * 1.05, 16);
        ball.vx =  s * Math.cos(a);
        ball.vy =  s * Math.sin(a);
        ball.lastSide = 'left';
        leftPaddle.hitFlash = 12;
        burst(ball.x, ball.y, LEFT_COLOR, 18, 2.5, 7);
        shake = 2.5;
      }
      if (ball.vx > 0 && hits(rightPaddle)) {
        ball.x = rightPaddle.x - BALL_R;
        const t = (ball.y - (rightPaddle.y + rightPaddle.h / 2)) / (rightPaddle.h / 2);
        const a = t * 60 * Math.PI / 180;
        const s = Math.min(Math.hypot(ball.vx, ball.vy) * 1.05, 16);
        ball.vx = -s * Math.cos(a);
        ball.vy =  s * Math.sin(a);
        ball.lastSide = 'right';
        rightPaddle.hitFlash = 12;
        burst(ball.x, ball.y, RIGHT_COLOR, 18, 2.5, 7);
        shake = 2.5;
      }

      // Collect power-ups
      powerups = powerups.filter(p => {
        if (Math.hypot(ball.x - p.x, ball.y - p.y) < BALL_R + p.r) { applyPowerup(p, now); return false; }
        return true;
      });

      // Scoring
      if (ball.x < 0) {
        burst(0, ball.y, RIGHT_COLOR, 28, 3, 9, 0.15);
        shake = 6;
        state.flash = 28;
        rightPaddle.score++;
        if (rightPaddle.score >= WINNING_SCORE) { state.over = true; restartBtn.style.display = 'block'; return; }
        resetBall(false);
      }
      if (ball.x > W) {
        burst(W, ball.y, LEFT_COLOR, 28, 3, 9, 0.15);
        shake = 6;
        state.flash = 28;
        leftPaddle.score++;
        if (leftPaddle.score >= WINNING_SCORE) { state.over = true; restartBtn.style.display = 'block'; return; }
        resetBall(true);
      }
    }

    // ─── Draw helpers ─────────────────────────────────────────
    function drawBg() {
      if (state.flash > 0) {
        ctx.fillStyle = `rgba(255,255,255,${state.flash * 0.011})`;
        ctx.fillRect(0, 0, W, H);
        state.flash--;
      }
      ctx.fillStyle = 'rgba(5,5,16,0.80)';
      ctx.fillRect(0, 0, W, H);
    }

    function drawCenter() {
      ctx.save();
      ctx.setLineDash([6, 14]);
      ctx.strokeStyle = `hsla(${ball.hue}, 80%, 65%, 0.2)`;
      ctx.lineWidth = 2;
      ctx.shadowColor = `hsl(${ball.hue}, 100%, 70%)`;
      ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.restore();
    }

    function drawPaddle(paddle, baseColor, now) {
      const color = paddle.fx.grow ? '#00ff88' : paddle.fx.shrink ? '#ff4455' : baseColor;
      // Pulsing glow — brighter right after a hit
      const pulse     = 20 + 7 * Math.sin(now * 0.003 + (paddle === leftPaddle ? 0 : Math.PI));
      const hitBright = paddle.hitFlash > 0 ? (paddle.hitFlash / 12) * 30 : 0;

      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur  = pulse + hitBright;
      ctx.fillStyle   = color;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, PADDLE_W, paddle.h, 3);
      ctx.fill();

      // Bright hit flash overlay
      if (paddle.hitFlash > 0) {
        ctx.globalAlpha = (paddle.hitFlash / 12) * 0.7;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(paddle.x, paddle.y, PADDLE_W, paddle.h, 3);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Core stripe
      ctx.shadowBlur  = 0;
      ctx.fillStyle   = '#ffffffbb';
      ctx.beginPath();
      ctx.roundRect(paddle.x + 2, paddle.y + 6, PADDLE_W - 4, paddle.h - 12, 2);
      ctx.fill();
      ctx.restore();
    }

    function drawTrail() {
      const isLaser = !!ball.fx.laser;
      ball.trail.forEach((pt, i) => {
        const t = i / ball.trail.length;
        const r = BALL_R * t * (isLaser ? 2 : 1);
        ctx.save();
        ctx.globalAlpha = t * (isLaser ? 0.85 : 0.5);
        if (isLaser) {
          ctx.shadowColor = `hsl(${pt.hue},100%,65%)`;
          ctx.shadowBlur  = 20;
          ctx.fillStyle   = `hsl(${pt.hue},100%,65%)`;
        } else {
          ctx.fillStyle = `hsla(${pt.hue},90%,65%,1)`;
        }
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawBall() {
      const isLaser = !!ball.fx.laser;
      const hue     = ball.fx.slow ? 200 : ball.fx.speed ? 40 : ball.hue;
      const color   = `hsl(${hue},100%,68%)`;
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur  = isLaser ? 40 : 26;
      ctx.fillStyle   = color;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle  = '#fff';
      ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R * 0.42, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 8;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawScore(now) {
      ctx.save();
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';

      // Big score numbers
      ctx.font     = 'bold 72px "Courier New", monospace';
      ctx.shadowBlur = 28;

      ctx.shadowColor = LEFT_COLOR;
      ctx.fillStyle   = LEFT_COLOR + '2a';
      ctx.fillText(leftPaddle.score, W / 2 - 90, 14);

      ctx.shadowColor = RIGHT_COLOR;
      ctx.fillStyle   = RIGHT_COLOR + '2a';
      ctx.fillText(rightPaddle.score, W / 2 + 90, 14);

      // Player labels
      ctx.font     = '10px "Courier New", monospace';
      ctx.shadowBlur = 0;

      ctx.fillStyle = LEFT_COLOR + '66';
      ctx.fillText('P1', W / 2 - 90, 90);

      ctx.fillStyle = RIGHT_COLOR + '66';
      ctx.fillText('P2', W / 2 + 90, 90);

      ctx.restore();
    }

    function drawPowerups(now) {
      powerups.forEach(p => {
        const pulse = 0.75 + 0.25 * Math.sin(p.age * 0.005);
        const fade  = Math.min(1, (p.life - p.age) / 1200);
        ctx.save();
        ctx.globalAlpha = fade;
        ctx.shadowColor = p.glow;
        ctx.shadowBlur  = 24 * pulse;
        ctx.strokeStyle = p.color; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * pulse, 0, Math.PI * 2); ctx.stroke();
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
        g.addColorStop(0, p.color + 'cc'); g.addColorStop(1, p.glow + '11');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.font = `${Math.round(p.r * 1.05)}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.fillText(p.icon, p.x, p.y + 1);
        ctx.restore();
      });
    }

    function drawHud(now) {
      const active = [
        ball.fx.speed         && { label: '⚡ SPEED',    color: '#ffdd00', t: ball.fx.speed         - now },
        ball.fx.slow          && { label: '❄ SLOW',     color: '#44ddff', t: ball.fx.slow           - now },
        ball.fx.laser         && { label: '✦ LASER',    color: '#dd44ff', t: ball.fx.laser          - now },
        leftPaddle.fx.grow    && { label: '▲ P1 GROW',  color: '#00ff88', t: leftPaddle.fx.grow     - now },
        leftPaddle.fx.shrink  && { label: '▼ P1 SHRINK',color: '#ff4455', t: leftPaddle.fx.shrink   - now },
        rightPaddle.fx.grow   && { label: '▲ P2 GROW',  color: '#00ff88', t: rightPaddle.fx.grow    - now },
        rightPaddle.fx.shrink && { label: '▼ P2 SHRINK',color: '#ff4455', t: rightPaddle.fx.shrink  - now },
      ].filter(Boolean);

      ctx.save();
      ctx.font = '10px "Courier New", monospace';
      ctx.textBaseline = 'middle';
      active.forEach((b, i) => {
        const x = 8 + i * 112, y = H - 18;
        ctx.fillStyle = b.color + '20'; ctx.fillRect(x, y - 10, 104, 20);
        ctx.fillStyle = b.color; ctx.textAlign = 'left';
        ctx.fillText(`${b.label} ${(b.t / 1000).toFixed(1)}s`, x + 5, y);
      });
      ctx.restore();
    }

    function drawOverlay(title, sub, color = '#fff') {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = color; ctx.shadowBlur = 38;
      ctx.font = 'bold 52px "Courier New", monospace';
      ctx.fillStyle = color;
      ctx.fillText(title, W / 2, H / 2 - 34);
      ctx.restore();
      ctx.font = '13px "Courier New", monospace';
      ctx.fillStyle = '#ffffff44';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(sub, W / 2, H / 2 + 20);
    }

    // ─── Main draw ────────────────────────────────────────────
    function draw(now) {
      drawBg();

      // Screen shake
      ctx.save();
      if (shake > 0.3) ctx.translate((Math.random() - 0.5) * shake * 2, (Math.random() - 0.5) * shake * 2);

      drawCenter();
      drawScore(now);
      drawPaddle(leftPaddle,  LEFT_COLOR,  now);
      drawPaddle(rightPaddle, RIGHT_COLOR, now);

      if (state.started && !state.over) {
        drawPowerups(now);
        drawTrail();
        drawBall();
        drawParticles();
        drawHud(now);
      }

      ctx.restore(); // end shake (overlays don't shake)

      if (!state.started) {
        drawOverlay('LASER PONG', 'Press SPACE or ENTER to start', LEFT_COLOR);
      } else if (state.over) {
        const isLeft = leftPaddle.score >= WINNING_SCORE;
        drawOverlay(`${isLeft ? 'P1' : 'P2'} WINS!`, 'Press ENTER or click Play Again', isLeft ? LEFT_COLOR : RIGHT_COLOR);
      } else if (state.paused) {
        drawOverlay('PAUSED', 'Press SPACE to resume');
      }
    }

    // ─── Loop ─────────────────────────────────────────────────
    function loop(now) {
      const dt = now - lastTime;
      lastTime = now;
      update(dt, now);
      draw(now);
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(loop); });
  </script>
</body>
</html>
